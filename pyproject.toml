[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".venv",
    "kaggle_data",
    "cg",                              # vendored from sample_submission
    "scripts/rule_based_agent.py",     # vendored Kiyota Mega Lucario
    "scripts/rule_based_dragapult.py", # vendored Kiyota Dragapult
    "scripts/rule_based_iono.py",      # vendored Kiyota Iono
    "scripts/rule_based_abomasnow.py", # vendored Kiyota Mega Abomasnow
    "scripts/rule_based_crustle.py",   # vendored harukiharada Crustle Wall
    "scripts/rule_based_crustle_dashimaki.py", # vendored dashimaki Day-1 #1 Crustle bot
    "submission_rule_based.tar.gz",    # build artifact, gitignored anyway
    "submission_rule_based_iono.tar.gz",
    "submission_rule_based_crustle_dashimaki.tar.gz",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",  # line length is enforced by formatter, not lint
]

[tool.ruff.lint.per-file-ignores]
# litellm shim MUST be installed in sys.modules before kaggle_environments
# is imported, so module-level imports cannot all sit at the top of the file.
"selfplay_test.py" = ["E402"]
"train/reinforce.py" = ["E402"]
